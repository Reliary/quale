name: quale self-review & guardrails
on: [pull_request, push]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Layer 1 — CLI Smoke Test
        run: python -m pytest tests/test_cli_smoke.py -v

      - name: Layer 2 — Output Contracts
        run: python -m pytest tests/test_output_contracts.py -v

      - name: Layer 5 — Schema Validation
        run: python -m pytest tests/test_schema_validation.py -v

      - name: Dogfood — review this PR
        run: |
          quale review --path .
          quale onboard --path .
          quale agent orient --path .
