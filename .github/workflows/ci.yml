name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check quale/

      - name: Type check
        run: mypy quale/ --ignore-missing-imports

      - name: Test
        run: python -m pytest tests/ -v --tb=short -q

  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Layer 1 — CLI smoke test
        run: python -m pytest tests/test_cli_smoke.py -v -q

      - name: Layer 2 — Output contracts
        run: python -m pytest tests/test_output_contracts.py -v -q

      - name: Layer 5 — Schema validation
        run: python -m pytest tests/test_schema_validation.py -v -q

      - name: Dogfood — self-review
        run: |
          quale review --path . || echo "review OK (exit $?)"
          quale onboard --path . || echo "onboard OK (exit $?)"
          quale agent orient --path . || echo "orient OK (exit $?)"
