name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.job }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/test_core.py tests/test_install.py tests/test_performance.py tests/test_property.py tests/test_reports.py -v --tb=short -q

  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Layer 1 - CLI smoke test
        run: python -m pytest tests/test_cli_smoke.py -v -q

      - name: Layer 2 - Output contracts
        run: python -m pytest tests/test_output_contracts.py -v -q

      - name: Layer 5 - Schema validation
        run: python -m pytest tests/test_schema_validation.py -v -q

      - name: Dogfood - self-review
        run: |
          quale review --path . || echo "review OK (exit $?)"
          quale onboard --path . || echo "onboard OK (exit $?)"
          quale agent orient --path . || echo "orient OK (exit $?)"

  regression:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps
        run: apt-get update -qq && apt-get install -y -qq git

      - name: Install
        run: pip install --no-cache-dir -e ".[dev]"

      - name: CLI smoke test
        run: python -m pytest tests/test_cli_smoke.py -v -q

      - name: Output contracts
        run: python -m pytest tests/test_output_contracts.py -v -q

      - name: Schema validation
        run: python -m pytest tests/test_schema_validation.py -v -q

      - name: Dogfood
        run: |
          quale review --path . || echo "review OK"
          quale onboard --path . || echo "onboard OK"
          quale agent orient --path . || echo "orient OK"
          quale core hub-risk --path . || echo "hub-risk OK"
          quale core test-gaps --path . || echo "test-gaps OK"
