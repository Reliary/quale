name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e . pytest

      - name: Run tests
        run: |
          python -m pytest \
            tests/test_cli_smoke.py \
            tests/test_core.py \
            tests/test_human_ci.py \
            tests/test_install.py \
            tests/test_output_contracts.py \
            tests/test_performance.py \
            tests/test_property.py \
            tests/test_reports.py \
            tests/test_schema_validation.py \
            -v --tb=short -q

  python-versions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.13"]
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Import check
        run: python -c "import quale.cli; print('ok')"

  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Layer 1 - CLI smoke test
        run: python -m pytest tests/test_cli_smoke.py -v -q

      - name: Layer 2 - Output contracts
        run: python -m pytest tests/test_output_contracts.py -v -q

      - name: Layer 5 - Schema validation
        run: python -m pytest tests/test_schema_validation.py -v -q

      - name: Dogfood - self-review
        run: |
          quale review --path . || echo "review OK (exit $?)"
          quale onboard --path . || echo "onboard OK (exit $?)"
          quale agent orient --path . || echo "orient OK (exit $?)"
